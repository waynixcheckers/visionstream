<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Maç İzle</title>
    <style>
        /* Modern ve Karanlık Tema Ayarları */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px 0;
            background-color: #1e293b;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Video Alanı (Responsive / Mobil Uyumlu) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Oranı */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-bar {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #94a3b8;
        }

        .live-dot {
            height: 10px;
            width: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>
        <h1>CANLI YAYIN</h1>
    </header>

    <div class="container">
        <div class="video-wrapper">
            <iframe 
                src="https://cdn.theoplayer.com/demos/iframe/theoplayer.html?autoplay=false&muted=false&preload=none&src=https://tv-trt1-dash.medya.trt.com.tr/master.mpd" 
                allowfullscreen 
                allow="autoplay; encrypted-media">
            </iframe>
        </div>

        <div class="status-bar">
            <span class="live-dot"></span>
            <span>Şu an Canlı Yayınlanıyor</span>
        </div>
    </div>

    <footer>
        &copy; 2026 Canlı Maç İzle Sitesi - Tüm Hakları Saklıdır.
    </footer>

</body>
</html>
